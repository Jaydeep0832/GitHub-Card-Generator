<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a; /* slate-900 */
            color: #e2e8f0;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
        }
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(30,41,59,0.5) 25%, rgba(51,65,85,0.5) 50%, rgba(30,41,59,0.5) 75%);
            background-size: 200% 100%;
            animation: loading 2s infinite ease-in-out;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        iframe {
            background: transparent;
            border: none;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">
    <div id="root" class="w-full max-w-[800px] mt-10"></div>

    <script type="text/babel">
        const { useState } = React;

        const Header = () => (
            <header className="mb-12 text-center fade-in">
                <div className="inline-flex items-center justify-center p-3 mb-4 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 shadow-[0_0_30px_rgba(99,102,241,0.2)]">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                    </svg>
                </div>
                <h1 className="text-4xl md:text-5xl font-bold text-white mb-3 tracking-tight bg-gradient-to-r from-indigo-300 via-white to-purple-300 bg-clip-text text-transparent">GitHub Dev Card Generator</h1>
                <p className="text-slate-400 text-lg max-w-xl mx-auto">Generate a premium, AI-powered portfolio card showcasing your GitHub identity and vibe.</p>
            </header>
        );

        const SearchForm = ({ onSubmit, loading, username, setUsername }) => (
            <form onSubmit={onSubmit} className="flex flex-col sm:flex-row gap-4 mb-12 fade-in relative z-10 w-full max-w-2xl mx-auto" style={{animationDelay: '0.1s'}}>
                <div className="relative flex-1">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span className="text-slate-500">@</span>
                    </div>
                    <input 
                        type="text" 
                        value={username} 
                        onChange={(e) => setUsername(e.target.value)}
                        placeholder="torvalds"
                        className="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl pl-10 pr-4 py-4 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30 transition-all text-lg shadow-inner"
                        required
                    />
                </div>
                <button 
                    type="submit"
                    disabled={loading}
                    className="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-8 py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(79,70,229,0.4)] hover:shadow-[0_0_25px_rgba(79,70,229,0.6)] disabled:opacity-50 disabled:hover:bg-indigo-600 disabled:cursor-not-allowed flex items-center justify-center min-w-[160px]"
                >
                    {loading ? (
                        <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    ) : 'Generate'}
                </button>
            </form>
        );

        const LoadingState = () => (
            <div className="fade-in w-full max-w-md mx-auto">
                <div className="glass-panel rounded-2xl p-8 flex flex-col items-center">
                    <div className="skeleton w-28 h-28 rounded-full mb-6"></div>
                    <div className="skeleton h-8 w-48 rounded mb-2"></div>
                    <div className="skeleton h-4 w-32 rounded mb-8"></div>
                    <div className="skeleton h-6 w-full rounded mb-6"></div>
                    <div className="w-full flex justify-between mb-8">
                        <div className="skeleton h-12 w-20 rounded"></div>
                        <div className="skeleton h-12 w-20 rounded"></div>
                    </div>
                    <div className="skeleton h-24 w-full rounded"></div>
                </div>
            </div>
        );

        const ErrorState = ({ message }) => (
            <div className="fade-in bg-red-900/20 border border-red-500/30 p-6 rounded-xl text-red-200 mb-8 max-w-xl mx-auto text-center flex items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-red-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p>{message}</p>
            </div>
        );

        const CardPreview = ({ url, onCopy, copied }) => (
            <div className="fade-in flex flex-col items-center w-full">
                <div className="w-full flex justify-center mb-8 relative">
                    <div className="absolute inset-0 bg-indigo-500/5 blur-3xl -z-10 rounded-[3rem]"></div>
                    <iframe 
                        src={url} 
                        className="w-full max-w-[500px] min-h-[750px] transition-all" 
                        title="Developer Card Preview"
                    ></iframe>
                </div>
                
                <button 
                    onClick={onCopy}
                    className={`inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-medium transition-all ${
                        copied 
                        ? 'bg-green-500/20 text-green-300 border border-green-500/50 shadow-[0_0_20px_rgba(34,197,94,0.2)]' 
                        : 'bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-600 hover:border-slate-500 shadow-lg'
                    }`}
                >
                    {copied ? (
                        <>
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />
                            </svg>
                            URL Copied to Clipboard!
                        </>
                    ) : (
                        <>
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                            </svg>
                            Copy Public Share Link
                        </>
                    )}
                </button>
            </div>
        );

        function App() {
            const [username, setUsername] = useState('');
            const [loading, setLoading] = useState(false);
            const [cardUrl, setCardUrl] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            const handleGenerate = async (e) => {
                e.preventDefault();
                if (!username.trim()) return;

                setLoading(true);
                setError(null);
                setCardUrl(null);
                setCopied(false);

                try {
                    const response = await fetch('http://localhost:8080/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: username.trim() })
                    });

                    if (!response.ok) {
                        const data = await response.json();
                        throw new Error(data.detail || 'Failed to generate card');
                    }

                    const data = await response.json();
                    setCardUrl(`http://localhost:8080${data.card_url}`);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(cardUrl);
                setCopied(true);
                setTimeout(() => setCopied(false), 3000);
            };

            return (
                <div className="w-full flex flex-col items-center">
                    <Header />
                    <SearchForm 
                        onSubmit={handleGenerate} 
                        loading={loading} 
                        username={username} 
                        setUsername={setUsername} 
                    />

                    {loading && <LoadingState />}
                    {error && <ErrorState message={error} />}
                    {cardUrl && !loading && (
                        <CardPreview 
                            url={cardUrl} 
                            onCopy={copyToClipboard} 
                            copied={copied} 
                        />
                    )}

                    <footer className="mt-20 mb-8 text-sm text-slate-500 text-center fade-in" style={{animationDelay: '0.4s'}}>
                        <p>Powered by <span className="text-indigo-400">Gemini Flash Lite</span> & <span className="text-indigo-400">Google ADK</span></p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
